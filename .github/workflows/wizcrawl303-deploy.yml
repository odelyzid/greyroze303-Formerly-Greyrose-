name: wizCrawl303 Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'WizCrawl303/**'
      - '.github/workflows/wizcrawl303-deploy.yml'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g., 0.2.0.0). Leave empty to use csproj version.'
        required: false
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: WizCrawl303/WizCrawl303.sln
  CSPROJ: WizCrawl303/WizCrawl303/WizCrawl303.csproj
  TEST_PROJECT: WizCrawl303/WizCrawl303.Tests/WizCrawl303.Tests.csproj
  RELEASE_NAME: wizCrawl303

defaults:
  run:
    working-directory: WizCrawl303

jobs:
  test-and-release:
    name: Test, Build, and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --no-build --verbosity normal

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.version_override }}" -ne "") {
            $ver = "${{ inputs.version_override }}"
          } else {
            [xml]$csproj = Get-Content "${{ env.CSPROJ }}"
            $ver = $csproj.Project.PropertyGroup.Version
            if (-not $ver) { $ver = "0.1.0.0" }
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish (win-x64 self-contained)
        run: |
          dotnet publish ${{ env.CSPROJ }} -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -o ../../publish/win-x64

      - name: Publish Server (win-x64 self-contained)
        run: |
          dotnet publish WizCrawl303.Server/WizCrawl303.Server.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -o ../../publish/server-win-x64

      - name: Package artifacts
        shell: pwsh
        working-directory: .
        run: |
          cd ..
          Compress-Archive -Path publish/win-x64/* -DestinationPath wizCrawl303-win-x64-${{ steps.version.outputs.tag }}.zip
          Compress-Archive -Path publish/server-win-x64/* -DestinationPath wizCrawl303-server-win-x64-${{ steps.version.outputs.tag }}.zip
          echo "Created artifacts for ${{ steps.version.outputs.tag }}"

      - name: Create tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = '${{ steps.version.outputs.tag }}';
            const sha = context.sha;
            try {
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/tags/${tag}`,
                sha
              });
              console.log(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — skipping creation`);
              } else {
                throw e;
              }
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ env.RELEASE_NAME }} ${{ steps.version.outputs.tag }}
          body: |
            ## wizCrawl303 ${{ steps.version.outputs.tag }}

            Automated build from commit ${{ github.sha }}.

            ### What's Included
            - **Client** — play solo or connect to a server
            - **Server** — standalone multiplayer server

            ### Downloads
            - [Client (Windows x64)](wizCrawl303-win-x64-${{ steps.version.outputs.tag }}.zip)
            - [Server (Windows x64)](wizCrawl303-server-win-x64-${{ steps.version.outputs.tag }}.zip)
          files: |
            wizCrawl303-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
