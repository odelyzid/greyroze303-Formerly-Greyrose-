name: Greyrose Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'wizard101/**'
      - '.github/workflows/greyrose-deploy.yml'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g., 1.2.0.0). Leave empty to use csproj version.'
        required: false
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT: wizard101/WizPS.sln
  CSPROJ: wizard101/Greyrose/Greyrose.csproj
  RELEASE_NAME: Greyrose

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT }} -c Release --no-restore

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.version_override }}" -ne "") {
            $ver = "${{ inputs.version_override }}"
          } else {
            [xml]$csproj = Get-Content "${{ env.CSPROJ }}"
            $ver = $csproj.Project.PropertyGroup.AssemblyVersion
            if (-not $ver) { $ver = "1.0.0.0" }
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish (win-x64 self-contained)
        run: |
          dotnet publish ${{ env.CSPROJ }} -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -o publish/win-x64

      - name: Restore (net8.0 for Linux)
        run: dotnet restore ${{ env.CSPROJ }} -p:TargetFramework=net8.0

      - name: Publish (linux-x64 self-contained)
        run: |
          dotnet publish ${{ env.CSPROJ }} -c Release -r linux-x64 --self-contained true `
            -p:PublishSingleFile=true -p:TargetFramework=net8.0 -o publish/linux-x64

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath Greyrose-win-x64-${{ steps.version.outputs.tag }}.zip
          Compress-Archive -Path publish/linux-x64/* -DestinationPath Greyrose-linux-x64-${{ steps.version.outputs.tag }}.zip
          echo "Created artifacts for ${{ steps.version.outputs.tag }}"

      - name: Create tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = '${{ steps.version.outputs.tag }}';
            const sha = context.sha;
            try {
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/tags/${tag}`,
                sha
              });
              console.log(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — skipping creation`);
              } else {
                throw e;
              }
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ env.RELEASE_NAME }} ${{ steps.version.outputs.tag }}
          body: |
            ## Greyrose ${{ steps.version.outputs.tag }}

            Automated build from commit ${{ github.sha }}.

            ### Downloads
            - [Windows x64](Greyrose-win-x64-${{ steps.version.outputs.tag }}.zip)
            - [Linux x64](Greyrose-linux-x64-${{ steps.version.outputs.tag }}.zip)
          files: |
            Greyrose-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
